# deploy/nginx.site.conf -- ONE site. Copy per domain to
# sites-available/<your-domain>, symlink into sites-enabled, run `nginx -t`,
# and reload. certbot adds the listen 443 / TLS block on top.
# Per-site values to change: server_name and root. For multiple sites on one
# box, also give each site its own PHP-FPM pool and point fastcgi_pass at it
# (see docs/DEPLOY.md).
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    root /var/www/app/public;
    index index.php;

    # Clean URLs: /checkout -> checkout.php. Nested paths (/auth/login) too.
    # ?$query_string keeps interactive state shareable.
    location / {
        try_files $uri $uri/ $uri.php?$query_string;
    }

    # Sitemap is generated by PHP but served at a .xml URL.
    location = /sitemap.xml {
        try_files $uri /sitemap.php;
    }

    # One canonical URL: strip .php from any direct request.
    if ($request_uri ~ ^([^?]*)\.php(\?.*)?$) {
        return 301 $1$2;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    # Block dotfiles (defense in depth; app data already lives outside root).
    location ~ /\.(?!well-known) {
        deny all;
    }
}
