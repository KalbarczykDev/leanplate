# deploy/nginx.conf -- copy to /etc/nginx/sites-available/app, then symlink and reload.
# certbot adds the listen 443 / TLS block on top of this.
server {
      listen 80;
      listen [::]:80;
      server_name example.com;

      root /var/www/app/public;
      index index.php;

      location / {
          try_files $uri $uri/ =404;
      }

      location ~ \.php$ {
          include snippets/fastcgi-php.conf;
          fastcgi_pass unix:/run/php/php8.3-fpm.sock;
      }

      # Block dotfiles (defense in depth; app data already lives outside
  root).
      location ~ /\.(?!well-known) {
          deny all;
      }
  }
